name: API Type Definitions Check

on:
  push:
    branches:
      - master
      - release
  pull_request:
    branches:
      - master
      - release

jobs:
  verify-api-types:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Regenerate API type definitions
        run: ./gradlew generateTypes
      - name: Verify checked-in API types match regenerated output
        shell: bash
        run: |
          if ! git diff --exit-code -- src/web/types/api-output.ts src/web/types/api-request.ts src/web/types/api-const.ts; then
            echo "::error::Checked-in API type definitions are out of date."
            echo "Run './gradlew generateTypes' locally and commit the updated files under src/web/types/."
            exit 1
          fi
