name: Pull Request Checker
on:
  pull_request_target:
    types:
      - opened
      - reopened
    branches:
      - master

jobs:
  check-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Verify PR checker script syntax
        run: node --check .github/scripts/check-pr.js
      - uses: actions/github-script@v8
        with:
          script: |
            const script = require('./.github/scripts/check-pr.js')
            await script({ github, context })
