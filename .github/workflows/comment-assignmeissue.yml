name: Auto-reply to Issue Assignment Requests

on:
  issue_comment:
    types: [created]

jobs:
  auto-reply:
    if: |
      github.event.issue.pull_request == null &&
      github.event.issue.state == 'open' &&
      github.event.comment.user.type == 'User' &&
      !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts/check-issue-comment.js
          sparse-checkout-cone-mode: false
      - name: Check and respond to assignment requests
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/check-issue-comment.js');
            await script({ github, context, core });
