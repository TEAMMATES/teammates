name: Auto-reply to Issue Assignment Requests

on:
  issue_comment:
    types: [created]

jobs:
  auto-reply:
    # Only run on issue comments on open issues, not PR comments
    if: |
      github.event.issue.pull_request == null &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and respond to assignment requests
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/check-issue-comment.js');
            await script({ github, context, core });
