name: Accessibility Tests

on:
  push:
    branches:
      - master
      - release
  pull_request:
    branches:
      - master
      - release
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Update Property File
        run: mv src/e2e/resources/test.ci-${{ matrix.browser }}.properties src/e2e/resources/test.properties
      - name: Start Docker services
        run: docker compose up -d
      - name: Create Config Files
        run: ./gradlew createConfigs testClasses
      - name: Configure Frontend URL
        run: sed -i 's#^app.frontend.url *=.*#app.frontend.url = http\\://localhost:8080#' src/main/resources/build-dev.properties
      - name: Install Frontend Dependencies
        run: npm ci
      - name: Build Frontend Bundle
        run: npm run build
      - name: Run DB Migrations
        run: ./gradlew liquibaseUpdate -PrunList=main
      - name: Start Server
        run: |
          ./gradlew serverRun &
          ./wait-for-server.sh
      - name: Start Axe Tests
        run: ./gradlew axeTests
