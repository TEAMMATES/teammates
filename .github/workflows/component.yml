name: Component Tests

on:
  push:
    branches:
      - master
      - release
  pull_request:
    branches:
      - master
      - release
  schedule:
    - cron: "0 0 * * *" #end of every day
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    strategy:
      fail-fast: false #ensure both tests run even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Cache eslint
        uses: actions/cache@v5
        with:
          path: |
            ./.eslintcache
          key: ${{ runner.os }}-eslint-${{ hashFiles('.eslintcache') }}
          restore-keys: |
            ${{ runner.os }}-eslint-
      - name: Cache stylelint
        uses: actions/cache@v5
        with:
          path: |
            ./.stylelintcache
          key: ${{ runner.os }}-stylelint-${{ hashFiles('.stylelintcache') }}
          restore-keys: |
            ${{ runner.os }}-stylelint-
      - name: Run Backend Linting
        run: ./gradlew lint --continue
      - name: Install Frontend Dependencies
        run: npm ci
      - name: Run Lint Checks
        run: npm run lint
  component-testing:
    strategy:
      fail-fast: false #ensure both tests run even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Update Property File
        run: mv src/test/resources/test.ci-${{ matrix.os }}.properties src/test/resources/test.properties
      - name: Run Backend Tests
        run: |
          ./gradlew createConfigs componentTests --continue
          ./gradlew jacocoReport
      - name: Install Frontend Dependencies
        run: npm ci
      - name: Run Frontend Tests
        run: npm run coverage
      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' #only upload to codecov on ubuntu VM
        uses: codecov/codecov-action@v3
