<div class="modal-header">
  <h5 class="modal-title" id="admin-add-instructor-modal-title">
    Add Instructor
  </h5>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss()"
  ></button>
</div>
<div class="modal-body">
  <div class="form-group mb-3">
    <label for="instructor-name"><strong>Name:</strong></label>
    <input
      type="text"
      class="form-control"
      id="instructor-name"
      [(ngModel)]="instructorName"
      [class.is-invalid]="!instructorName.trim()"
    />
  </div>
  <div class="form-group mb-3">
    <label for="instructor-email"><strong>Email:</strong></label>
    <input
      type="email"
      class="form-control"
      id="instructor-email"
      [(ngModel)]="instructorEmail"
      [class.is-invalid]="!instructorEmail.trim()"
    />
  </div>
  <div class="form-group mb-3">
    <label for="instructor-institution"><strong>Institution:</strong></label>
    <input
      type="text"
      class="form-control"
      id="instructor-institution"
      [(ngModel)]="instructorInstitution"
      [class.is-invalid]="!instructorInstitution.trim()"
    />
  </div>
</div>
<div class="modal-footer">
  <button
    type="button"
    class="btn btn-secondary"
    (click)="activeModal.dismiss()"
  >
    Cancel
  </button>
  <button
    type="button"
    class="btn btn-primary"
    (click)="confirm()"
    [disabled]="!instructorName.trim() || !instructorEmail.trim() || !instructorInstitution.trim()"
  >
    Confirm
  </button>
</div>
