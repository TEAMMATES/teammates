<div *tmIsLoading="isLoadingLoginMethods()">
  <div class="card bg-light mx-auto" style="max-width: 600px">
    <div class="card-header bg-primary text-white">
      <h1 class="mb-0 h3">Sign in</h1>
    </div>
    <div class="card-body">
      <p>Choose a sign-in method to continue.</p>
      <tm-login-method-buttons-container
        [nextUrl]="nextUrl()"
        [supportedLoginMethods]="loginMethods()"
      ></tm-login-method-buttons-container>
    </div>
  </div>
</div>
