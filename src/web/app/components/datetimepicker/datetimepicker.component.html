<div class="d-flex align-items-center gap-2">
  <div>
    <tm-datepicker
      [date]="date"
      [isDisabled]="isDisabled"
      [minDate]="minDate!"
      [maxDate]="maxDate!"
      (dateChangeCallback)="onDateChange($event)"
    ></tm-datepicker>
  </div>
  <div>
    <tm-timepicker
      [date]="date"
      [time]="time"
      [isDisabled]="isDisabled"
      [minDate]="minDate!"
      [maxDate]="maxDate!"
      [minTime]="minTime"
      [maxTime]="maxTime"
      (timeChange)="onTimeChange($event)"
    ></tm-timepicker>
  </div>
</div>
