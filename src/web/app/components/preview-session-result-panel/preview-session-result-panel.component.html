<div class="card-body background-color-light-blue text-center">
  <div class="row align-items-center">
    <div class="col-lg-2 text-lg-end mb-3 mb-lg-0">
      <b>Preview Results:</b>
    </div>
    <div class="col-12 col-lg-5 mb-3 mb-lg-0">
      <div class="row align-items-center justify-content-center">
        <select
          id="preview-student"
          class="col-12 col-sm-8 col-lg-6 form-control form-select preview-select"
          [(ngModel)]="userIdOfStudentToPreview"
          aria-label="Select student to preview as"
        >
          @for (student of studentsOfCourse; track student) {
            <option [ngValue]="student.userId">[{{ student.teamName }}] {{ student.name }}</option>
          }
        </select>
        <div class="mt-1 mt-lg-0 col-sm-4 col-lg-6">
          @if (userIdOfStudentToPreview.length !== 0) {
            <a
              [routerLink]="['/web/sessions', feedbackSessionId, 'result']"
              [queryParams]="{ previewAs: userIdOfStudentToPreview }"
              target="_blank"
              rel="noopener noreferrer"
              [ngbTooltip]="
                userIdOfStudentToPreview.length !== 0
                  ? 'View how the session results would look like to a student.'
                  : 'Preview is unavailable if the course has yet to have any student enrolled.'
              "
            >
              <ng-container *ngTemplateOutlet="previewStudentBtn"></ng-container>
            </a>
          } @else {
            <button
              id="btn-preview-student"
              class="btn btn-primary"
              [disabled]="userIdOfStudentToPreview.length === 0 || forDisplayOnly"
            >
              Preview as Student
            </button>
          }
        </div>
        <ng-template #previewStudentBtn>
          <button
            id="btn-preview-student"
            class="btn btn-primary"
            [disabled]="userIdOfStudentToPreview.length === 0 || forDisplayOnly"
          >
            Preview as Student
          </button>
        </ng-template>
      </div>
    </div>
    <div class="col-12 col-lg-5">
      <div class="row align-items-center justify-content-center">
        <select
          id="preview-instructor"
          class="col-12 col-sm-8 col-lg-6 form-control form-select preview-select"
          [(ngModel)]="userIdOfInstructorToPreview"
          aria-label="Select instructor to preview as"
        >
          @for (instructor of instructorsOfCourse; track instructor) {
            <option [ngValue]="instructor.userId">
              {{ instructor.name }}
            </option>
          }
        </select>
        <div class="mt-1 mt-lg-0 col-sm-4 col-lg-6 w-max-content">
          @if (userIdOfInstructorToPreview.length !== 0) {
            <a
              [routerLink]="['/web/instructor/sessions', feedbackSessionId, 'result']"
              [queryParams]="{ previewAs: userIdOfInstructorToPreview }"
              target="_blank"
              rel="noopener noreferrer"
              ngbTooltip="View how the session results would look like to an instructor."
            >
              <ng-container *ngTemplateOutlet="previewInstructorBtn"></ng-container>
            </a>
          } @else {
            <button
              id="btn-preview-instructor"
              class="btn btn-primary"
              [disabled]="userIdOfInstructorToPreview.length === 0 || forDisplayOnly"
            >
              Preview as Instructor
            </button>
          }
        </div>
        <ng-template #previewInstructorBtn>
          <button
            id="btn-preview-instructor"
            class="btn btn-primary"
            [disabled]="userIdOfInstructorToPreview.length === 0 || forDisplayOnly"
          >
            Preview as Instructor
          </button>
        </ng-template>
      </div>
    </div>
  </div>
</div>
