<div class="login-method-buttons d-flex flex-column gap-3 mx-auto">
  @if (isSupported(LoginMethod.GOOGLE)) {
    <tm-google-login-button (login)="login(LoginMethod.GOOGLE)"></tm-google-login-button>
  }

  @if (isSupported(LoginMethod.DEV_SERVER)) {
    <tm-dev-server-login-button (login)="login(LoginMethod.DEV_SERVER)"></tm-dev-server-login-button>
  }
</div>
