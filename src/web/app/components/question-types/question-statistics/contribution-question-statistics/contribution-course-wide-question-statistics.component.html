@if (displayContributionStats && statistics.rows.length) {
  <div>
    <div class="row">
      <div class="col-sm-4 text-color-gray">
        <strong> Response Summary </strong>
      </div>
      <div class="col-sm-8" style="text-align: right">
        [<a
          tmRouterLink="/web/instructor/help"
          [queryParams]="{ questionId: QuestionsSectionQuestions.CONTRIBUTION, section: Sections.questions }"
          rel="noopener noreferrer"
          target="_blank"
          >How do I interpret/use these values?</a
        >]
      </div>
    </div>
    <div class="row mb-4">
      <div class="col-sm-12 table-responsive">
        <tm-sortable-table [rows]="rowsData" [columns]="columnsData"></tm-sortable-table>
      </div>
    </div>
  </div>
}
