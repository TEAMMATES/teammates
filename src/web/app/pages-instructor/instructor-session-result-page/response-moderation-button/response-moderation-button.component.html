<a
  [tmRouterLink]="
    isGiverInstructor
      ? ['/web/instructor/sessions', session.feedbackSessionId, 'submission']
      : ['/web/sessions', session.feedbackSessionId, 'submission']
  "
  [queryParams]="{
    moderatedPerson: userIdForModeration,
    moderatedQuestionId: moderatedQuestionId,
  }"
  class="btn btn-sm"
  [ngClass]="btnStyle === 'PRIMARY' ? 'btn-primary' : 'btn-light'"
  target="_blank"
  rel="noopener noreferrer"
>
  Moderate response
</a>
