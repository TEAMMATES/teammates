  [tmRouterLink]="isGiverInstructor ? '/web/instructor/sessions/submission' : '/web/sessions/submission'"

    fsid: session.feedbackSessionId,
    moderatedperson: userIdForModeration,
    moderatedquestionId: moderatedQuestionId,

>
  Moderate response
