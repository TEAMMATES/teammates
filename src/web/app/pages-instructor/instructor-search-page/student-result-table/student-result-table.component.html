@for (course of studentTables; track course) {
  <div class="card border border-light-blue mb-3 student-course-table">
    <div
      class="card-header alert alert-primary alert-no-bottom fw-bold text-break"
      [innerHtml]="'[' + course.courseId + ']' | highlighter: searchString : true"
    ></div>
    <div class="card-body p-0">
      <tm-student-list
        [courseId]="course.courseId"
        [students]="course.students"
        [useGrayHeading]="true"
        [isActionButtonsEnabled]="isActionButtonsEnabled"
        [isPartialMatchHighlightingEnabled]="isPartialMatchHighlightingEnabled"
        [tableSortBy]="studentSortBy"
        [tableSortOrder]="studentSortOrder"
        [searchString]="searchString"
        (removeStudentFromCourseEvent)="removeStudentFromCourseEvent.emit($event)"
      >
      </tm-student-list>
    </div>
  </div>
}
